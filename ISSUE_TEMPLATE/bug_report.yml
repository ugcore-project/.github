name: Bug Report
description: Report a bug or unexpected behaviour in UgCore
title: "fix: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in every section so we can reproduce and fix it quickly.
        > ⚠️ For security vulnerabilities, do **not** use this form — see our [Security Policy](../SECURITY.md).

  - type: dropdown
    id: version
    attributes:
      label: UgCore Version
      description: Which version are you running? Check your `fxmanifest.lua` or the latest release tag.
      options:
        - Latest (main branch)
        - Latest stable release
        - Older release (specify in description)
    validations:
      required: true

  - type: input
    id: artifact
    attributes:
      label: FiveM Artifact Version
      description: Found in your server console on startup.
      placeholder: "e.g. 10849"
    validations:
      required: true

  - type: input
    id: database
    attributes:
      label: Database Version
      placeholder: "e.g. MySQL 8.0.33 / MariaDB 10.6.12"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Give us the exact steps to trigger the bug.
      placeholder: |
        1. Start the server with ug-core ensured
        2. Join as a player
        3. Run command /xxx
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Errors
      description: Paste any server console errors or client F8 errors here.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other resources that might be conflicting? Custom config? Recent changes?
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I am running the latest version of UgCore
          required: true
        - label: I have removed other resources to confirm UgCore is the cause
          required: false
