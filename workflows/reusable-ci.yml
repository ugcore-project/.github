name: Reusable — CI

on:
  workflow_call:
    inputs:
      lua-version:
        description: Lua version to lint with
        required: false
        default: '5.4'
        type: string

jobs:
  lint:
    name: Lint Lua
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get update -q
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: |
          luacheck . \
            --globals exports \
            --globals AddEventHandler \
            --globals RegisterNetEvent \
            --globals TriggerEvent \
            --globals TriggerServerEvent \
            --globals TriggerClientEvent \
            --globals RegisterCommand \
            --globals UgCore \
            --globals Citizen \
            --globals source \
            --exclude-files ".luacheckrc" \
            --exclude-files "**/*.min.lua" \
            || true  # Remove || true once all warnings are resolved

  structure:
    name: Validate fxmanifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check fxmanifest.lua exists
        run: |
          if [ ! -f "fxmanifest.lua" ]; then
            echo "❌ fxmanifest.lua not found"
            exit 1
          fi
          echo "✅ fxmanifest.lua found"

      - name: Check version field is present
        run: |
          if ! grep -q "^version" fxmanifest.lua; then
            echo "❌ version field missing from fxmanifest.lua"
            exit 1
          fi
          echo "✅ version field present"
